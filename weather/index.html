<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melbourne Weather in Context</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
        --accent: #1a5276;
        --accent-light: #2e86c1;
        --text: #222;
        --muted: #666;
        --border: #e2e2de;
        --bg: #f8f8f6;
        --card: #fff;
        --band-outer: #d6e6f2;
        --band-inner: #9cc3e0;
        --median: #1a5276;
        --forecast: #e8743b;
        --current: #2e8b57;
    }

    body {
        font-family: 'Inter', sans-serif;
        font-size: 15.5px;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
        margin: 0;
        padding: 40px 20px 60px;
    }

    .wrap { max-width: 720px; margin: 0 auto; }

    h1 {
        font-family: 'Source Serif 4', serif;
        font-weight: 600;
        font-size: 1.8rem;
        color: var(--accent);
        margin: 0 0 4px;
    }

    .subtitle { color: var(--muted); font-size: 0.95rem; margin: 0 0 28px; }

    /* ── Current conditions ── */
    .now {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-bottom: 28px;
    }

    .stat {
        flex: 1 1 120px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px 16px;
    }

    .stat .label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin-bottom: 4px;
    }

    .stat .value {
        font-family: 'Source Serif 4', serif;
        font-size: 1.7rem;
        font-weight: 600;
        color: var(--accent);
    }

    .stat .value small { font-size: 0.9rem; font-weight: 400; color: var(--muted); }

    /* ── Headline verdict ── */
    .verdict {
        background: var(--card);
        border: 1px solid var(--border);
        border-left: 4px solid var(--forecast);
        border-radius: 6px;
        padding: 16px 18px;
        margin-bottom: 28px;
        font-size: 1.02rem;
    }

    .verdict strong { color: var(--forecast); }

    /* ── Chart ── */
    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 20px;
        margin-bottom: 24px;
    }

    .card h2 {
        font-family: 'Source Serif 4', serif;
        font-size: 1.1rem;
        color: var(--accent);
        margin: 0 0 4px;
    }

    .card .hint { color: var(--muted); font-size: 0.85rem; margin: 0 0 12px; }

    /* ── Side-by-side vertical charts ── */
    .charts { display: flex; gap: 20px; flex-wrap: wrap; }
    .chart { flex: 1 1 240px; min-width: 240px; }
    .chart h3 {
        font-family: 'Source Serif 4', serif;
        font-weight: 600;
        font-size: 0.98rem;
        color: var(--accent);
        text-align: center;
        margin: 0 0 6px;
    }

    svg { width: 100%; height: auto; display: block; }

    .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 10px;
        font-size: 0.82rem;
        color: var(--muted);
    }

    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
    .swatch.line { width: 14px; height: 0; border-top: 3px solid; border-radius: 0; }

    /* ── Percentile table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border); }
    th:first-child, td:first-child { text-align: left; }
    thead th { color: var(--muted); font-weight: 500; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    tbody tr:last-child td { border-bottom: none; }
    td.highlight { color: var(--forecast); font-weight: 600; }

    .meta { font-size: 0.78rem; color: #999; margin-top: 20px; line-height: 1.5; }
    .meta a { color: var(--accent-light); }

    .date-stamp {
        font-size: 0.88rem;
        color: var(--muted);
        margin: 0 0 20px;
        padding: 9px 14px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 6px;
    }
    .date-stamp strong { color: var(--accent); }
    .date-stamp .fetch-time { opacity: 0.7; font-size: 0.82rem; }

    .error { color: #b03030; background: #fdecec; border: 1px solid #f5c6c6; padding: 14px; border-radius: 6px; }
    .loading { color: var(--muted); }

    @media (max-width: 480px) {
        .stat .value { font-size: 1.4rem; }
        h1 { font-size: 1.5rem; }
    }
</style>
</head>
<body>
<div class="wrap">
    <h1>Melbourne weather, in context</h1>
    <p class="subtitle">Today&rsquo;s forecast against 35 years of history for this date.</p>

    <div id="content">
        <p class="loading">Loading current conditions and climatology&hellip;</p>
    </div>

    <p class="meta" id="meta"></p>
</div>

<script>
const LAT = -37.8136, LON = 144.9631;
const fmt = (x, d = 1) => (x === null || x === undefined || isNaN(x)) ? "–" : x.toFixed(d);

// Linear interpolation of the forecast's percentile rank from the 5 stored points.
function rankFromPercentiles(t, day) {
    const pts = [
        [day.p2_5, 2.5], [day.p16, 16], [day.p50, 50],
        [day.p84, 84], [day.p97_5, 97.5]
    ];
    if (t <= pts[0][0]) {
        return Math.max(0, 2.5 - (pts[0][0] - t) * (2.5 / Math.max(0.5, day.std)));
    }
    if (t >= pts[pts.length - 1][0]) {
        return Math.min(100, 97.5 + (t - pts[pts.length - 1][0]) * (2.5 / Math.max(0.5, day.std)));
    }
    for (let i = 0; i < pts.length - 1; i++) {
        const [t0, p0] = pts[i], [t1, p1] = pts[i + 1];
        if (t >= t0 && t <= t1) {
            const f = (t1 === t0) ? 0 : (t - t0) / (t1 - t0);
            return p0 + f * (p1 - p0);
        }
    }
    return 50;
}

// Generic vertical distribution chart.
// opts: { dMin, dMax, step, unit, bands:[{from,to,fill}], lines:[{value,color,label,dashed,big}], ariaLabel }
function vChart(opts) {
    const W = 300, H = 430;
    const axisX = 42, bandX0 = 60, bandX1 = 106, labelX = bandX1 + 6;
    const yTop = 30, yBot = 396;
    const y = v => yBot - (v - opts.dMin) / (opts.dMax - opts.dMin) * (yBot - yTop);

    // axis + ticks
    let ticks = `<line x1="${axisX}" y1="${yTop - 8}" x2="${axisX}" y2="${yBot + 6}" stroke="#ddd"/>`;
    ticks += `<text x="${axisX - 6}" y="${yTop - 12}" text-anchor="end" font-size="10" fill="#aaa">${opts.unit}</text>`;
    for (let t = Math.ceil(opts.dMin / opts.step) * opts.step; t <= opts.dMax + 1e-6; t += opts.step) {
        const yy = y(t).toFixed(1);
        ticks += `<line x1="${axisX - 4}" y1="${yy}" x2="${axisX}" y2="${yy}" stroke="#bbb"/>`;
        ticks += `<text x="${axisX - 7}" y="${(+yy + 4).toFixed(1)}" text-anchor="end" font-size="11" fill="#888">${+t.toFixed(2)}</text>`;
    }

    // bands (vertical rectangles)
    let bands = "";
    for (const b of opts.bands) {
        const yt = y(b.to), yb = y(b.from);
        bands += `<rect x="${bandX0}" y="${yt.toFixed(1)}" width="${bandX1 - bandX0}" height="${Math.max(0, yb - yt).toFixed(1)}" fill="${b.fill}" rx="3"/>`;
    }

    // reference lines (median / markers / records)
    const lines = opts.lines.filter(l => Number.isFinite(l.value));
    let lineSvg = "";
    for (const l of lines) {
        const yy = y(l.value);
        const dash = l.dashed ? ` stroke-dasharray="5 4" opacity="0.85"` : "";
        const wgt = l.big ? 2.5 : (l.dashed ? 1.5 : 2);
        lineSvg += `<line x1="${axisX}" y1="${yy.toFixed(1)}" x2="${bandX1 + 4}" y2="${yy.toFixed(1)}" stroke="${l.color}" stroke-width="${wgt}"${dash}/>`;
        if (l.big) {
            const xx = bandX1 + 4;
            lineSvg += `<polygon points="${xx},${yy.toFixed(1)} ${xx - 7},${(yy - 4.5).toFixed(1)} ${xx - 7},${(yy + 4.5).toFixed(1)}" fill="${l.color}"/>`;
        }
    }

    // labels on the right, nudged downward to avoid overlap
    const GAP = 13;
    const sorted = lines.map(l => ({ ...l, yIdeal: y(l.value) })).sort((a, b) => a.yIdeal - b.yIdeal);
    let prev = -Infinity;
    for (const s of sorted) { s.yLab = Math.max(s.yIdeal, prev + GAP); prev = s.yLab; }
    let labelSvg = "";
    for (const s of sorted) {
        labelSvg += `<line x1="${bandX1 + 4}" y1="${s.yIdeal.toFixed(1)}" x2="${labelX}" y2="${s.yLab.toFixed(1)}" stroke="${s.color}" stroke-width="0.7" opacity="0.5"/>`;
        labelSvg += `<text x="${labelX + 3}" y="${(s.yLab + 3.5).toFixed(1)}" font-size="${s.big ? 11.5 : 10.5}" font-weight="${s.big ? 600 : 400}" fill="${s.color}">${s.label}</text>`;
    }

    return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${opts.ariaLabel}">
        ${bands}${ticks}${lineSvg}${labelSvg}
    </svg>`;
}

function tempChart(day, forecastMax, currentTemp) {
    const orange = "var(--forecast)", blue = "var(--accent-light)";
    const recs = [day.rec_high_max, day.rec_low_max, day.rec_high_min, day.rec_low_min].filter(Number.isFinite);
    const lo = Math.min(day.p2_5, currentTemp, forecastMax, ...recs);
    const hi = Math.max(day.p97_5, currentTemp, forecastMax, ...recs);
    const pad = Math.max(1.0, (hi - lo) * 0.05);
    const dMin = Math.floor(lo - pad), dMax = Math.ceil(hi + pad);
    const range = dMax - dMin;
    return vChart({
        dMin, dMax, unit: "°C",
        step: range <= 15 ? 2 : (range <= 30 ? 5 : 10),
        ariaLabel: "Forecast max temperature versus historical distribution and records",
        bands: [
            { from: day.p2_5, to: day.p97_5, fill: "var(--band-outer)" },
            { from: day.p16, to: day.p84, fill: "var(--band-inner)" },
        ],
        lines: [
            { value: day.p50, color: "var(--median)", label: "median " + fmt(day.p50) + "&deg;" },
            { value: forecastMax, color: orange, big: true, label: "Forecast " + fmt(forecastMax) + "&deg;" },
            { value: currentTemp, color: "var(--current)", big: true, label: "Now " + fmt(currentTemp) + "&deg;" },
            { value: day.rec_high_max, color: orange, dashed: true, label: "Highest max " + fmt(day.rec_high_max) + "&deg;" },
            { value: day.rec_high_min, color: orange, dashed: true, label: "Highest min " + fmt(day.rec_high_min) + "&deg;" },
            { value: day.rec_low_max, color: blue, dashed: true, label: "Lowest max " + fmt(day.rec_low_max) + "&deg;" },
            { value: day.rec_low_min, color: blue, dashed: true, label: "Lowest min " + fmt(day.rec_low_min) + "&deg;" },
        ],
    });
}

function rainChart(day, forecastRain, since9) {
    const orange = "var(--forecast)";
    const hi = Math.max(day.rain_p97_5, day.rain_rec, forecastRain, since9);
    const pad = Math.max(1.0, hi * 0.05);
    const dMax = Math.ceil(hi + pad);
    return vChart({
        dMin: 0, dMax, unit: "mm",
        step: dMax <= 8 ? 1 : (dMax <= 16 ? 2 : (dMax <= 40 ? 5 : 10)),
        ariaLabel: "Forecast rainfall versus historical distribution and record",
        bands: [
            { from: 0, to: day.rain_p97_5, fill: "var(--band-outer)" },
            { from: 0, to: day.rain_p84, fill: "var(--band-inner)" },
        ],
        lines: [
            { value: day.rain_p50, color: "var(--median)", label: "median " + fmt(day.rain_p50) + "mm" },
            { value: forecastRain, color: orange, big: true, label: "Forecast " + fmt(forecastRain) + "mm" },
            { value: since9, color: "var(--current)", big: true, label: "Since 9am " + fmt(since9) + "mm" },
            { value: day.rain_rec, color: orange, dashed: true, label: "Wettest " + fmt(day.rain_rec) + "mm" },
        ],
    });
}

function verdictText(sigma) {
    const a = Math.abs(sigma);
    if (a < 0.5) return "right around the seasonal normal";
    if (a < 1) return (sigma > 0 ? "a little warmer" : "a little cooler") + " than usual";
    if (a < 2) return (sigma > 0 ? "notably warmer" : "notably cooler") + " than usual";
    if (a < 3) return (sigma > 0 ? "much warmer" : "much colder") + " than usual";
    return (sigma > 0 ? "extraordinarily warm" : "extraordinarily cold") + " for the date";
}

function rainVerdictText(rain, day) {
    if (rain < 0.2) return "a dry day";
    if (rain <= day.rain_p50) return "on the drier side";
    if (rain <= day.rain_p84) return "around a typical wet day";
    if (rain <= day.rain_p97_5) return "a notably wet day";
    return "an exceptionally wet day";
}

async function main() {
    const content = document.getElementById("content");
    try {
        // _t rounded to the hour busts the browser cache without hammering the API
        const cacheBust = Math.floor(Date.now() / 3_600_000);
        const fxUrl = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
            + `&current=temperature_2m,precipitation&daily=temperature_2m_max,temperature_2m_min,precipitation_sum`
            + `&hourly=precipitation&timezone=Australia%2FMelbourne&forecast_days=1&_t=${cacheBust}`;
        const [fxRes, climRes] = await Promise.all([
            fetch(fxUrl, { cache: "no-store" }),
            fetch("climatology.json?v=3", { cache: "no-cache" })
        ]);
        if (!fxRes.ok) throw new Error("Weather API returned " + fxRes.status);
        if (!climRes.ok) throw new Error("Could not load climatology.json");
        const fx = await fxRes.json();
        const clim = await climRes.json();

        const dateStr = fx.daily.time[0];                 // YYYY-MM-DD (Melbourne local)
        const d = new Date(dateStr + "T00:00:00");
        const month = d.getMonth() + 1, dayNum = d.getDate();
        const day = clim.days.find(x => x.month === month && x.day === dayNum)
                 || clim.days.find(x => x.month === month && x.day === 28); // Feb-29 fallback

        const currentTemp = fx.current.temperature_2m;
        const forecastMax = fx.daily.temperature_2m_max[0];
        const forecastMin = fx.daily.temperature_2m_min[0];
        const forecastRain = fx.daily.precipitation_sum[0] || 0;

        // rainfall since 9am local: sum hourly precip from 09:00 up to the current hour
        let since9 = 0;
        if (fx.hourly && fx.hourly.precipitation) {
            const curHour = parseInt(fx.current.time.slice(11, 13), 10);
            fx.hourly.time.forEach((t, i) => {
                const h = parseInt(t.slice(11, 13), 10);
                if (h >= 9 && h <= curHour) since9 += fx.hourly.precipitation[i] || 0;
            });
        }
        since9 = Math.round(since9 * 10) / 10;

        const sigma = (forecastMax - day.mean) / day.std;
        const rank = Math.round(rankFromPercentiles(forecastMax, day));
        const desc = verdictText(sigma);
        const rainDesc = rainVerdictText(forecastRain, day);

        const niceDate = d.toLocaleDateString("en-AU", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
        const fetchedAt = new Date().toLocaleTimeString("en-AU", { hour: "2-digit", minute: "2-digit", timeZone: "Australia/Melbourne" });
        const recDate = iso => {
            const rd = new Date((iso || "") + "T00:00:00");
            return isNaN(rd) ? "&mdash;" : rd.toLocaleDateString("en-AU", { day: "numeric", month: "short", year: "numeric" });
        };

        content.innerHTML = `
            <div class="date-stamp">
                <span><strong>${niceDate}</strong></span>
                <span class="fetch-time">fetched at ${fetchedAt} AEST</span>
            </div>
            <div class="now">
                <div class="stat"><div class="label">Right now</div><div class="value">${fmt(currentTemp)}<small>&deg;C</small></div></div>
                <div class="stat"><div class="label">Forecast high</div><div class="value">${fmt(forecastMax)}<small>&deg;C</small></div></div>
                <div class="stat"><div class="label">Forecast low</div><div class="value">${fmt(forecastMin)}<small>&deg;C</small></div></div>
                <div class="stat"><div class="label">Rain since 9am</div><div class="value">${fmt(since9)}<small>mm</small></div></div>
                <div class="stat"><div class="label">Rain forecast</div><div class="value">${fmt(forecastRain)}<small>mm</small></div></div>
            </div>

            <div class="verdict">
                Today&rsquo;s forecast high of <strong>${fmt(forecastMax)}&deg;C</strong> is
                <strong>${desc}</strong> &mdash; that&rsquo;s
                <strong>${sigma >= 0 ? "+" : ""}${sigma.toFixed(1)}&sigma;</strong>
                from the mean, warmer than about <strong>${rank}%</strong> of days on this date historically.
            </div>

            <div class="verdict" style="border-left-color:var(--accent-light)">
                With <strong style="color:var(--accent-light)">${fmt(forecastRain)}&nbsp;mm</strong> forecast, today looks like
                <strong style="color:var(--accent-light)">${rainDesc}</strong> &mdash; measurable rain falls on about
                <strong style="color:var(--accent-light)">${fmt(day.rain_pop, 0)}%</strong> of days around this date.
            </div>

            <div class="card">
                <h2>Today vs. the historical distribution</h2>
                <p class="hint">${niceDate} &middot; &plusmn;7-day window, 1990&ndash;2024 (${day.n} days).</p>
                <div class="charts">
                    <div class="chart"><h3>Max temperature</h3>${tempChart(day, forecastMax, currentTemp)}</div>
                    <div class="chart"><h3>Rainfall</h3>${rainChart(day, forecastRain, since9)}</div>
                </div>
                <div class="legend">
                    <span><i class="swatch" style="background:var(--band-outer)"></i> outer range (to 97.5%)</span>
                    <span><i class="swatch" style="background:var(--band-inner)"></i> inner range (to 84%)</span>
                    <span><i class="swatch line" style="border-color:var(--median)"></i> median</span>
                    <span><i class="swatch line" style="border-color:var(--forecast)"></i> forecast</span>
                    <span><i class="swatch line" style="border-color:var(--current)"></i> current</span>
                    <span><i class="swatch line" style="border-color:var(--forecast);border-top-style:dashed"></i> record high / wettest</span>
                    <span><i class="swatch line" style="border-color:var(--accent-light);border-top-style:dashed"></i> record low</span>
                </div>
            </div>

            <div class="card">
                <h2>Historical max-temperature percentiles for this date</h2>
                <table>
                    <thead><tr><th>Percentile</th><th>Max temp</th><th>Meaning</th></tr></thead>
                    <tbody>
                        <tr><td>2.5%</td><td>${fmt(day.p2_5)}&deg;C</td><td>&minus;2&sigma; (very cool)</td></tr>
                        <tr><td>16%</td><td>${fmt(day.p16)}&deg;C</td><td>&minus;1&sigma;</td></tr>
                        <tr><td>50% (median)</td><td>${fmt(day.p50)}&deg;C</td><td>typical</td></tr>
                        <tr><td>84%</td><td>${fmt(day.p84)}&deg;C</td><td>+1&sigma;</td></tr>
                        <tr><td>97.5%</td><td>${fmt(day.p97_5)}&deg;C</td><td>+2&sigma; (very warm)</td></tr>
                        <tr><td class="highlight">Today&rsquo;s forecast</td><td class="highlight">${fmt(forecastMax)}&deg;C</td><td class="highlight">${sigma >= 0 ? "+" : ""}${sigma.toFixed(2)}&sigma; from mean (${fmt(day.mean)}&deg;C)</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h2>Rainfall for this date</h2>
                <p class="hint">Daily totals over &plusmn;7 days (1990&ndash;2024). Measurable rain on about ${fmt(day.rain_pop, 0)}% of days.</p>
                <table>
                    <thead><tr><th>Measure</th><th>Rain</th><th>Note</th></tr></thead>
                    <tbody>
                        <tr><td>Median (50%)</td><td>${fmt(day.rain_p50)}&thinsp;mm</td><td>half of days are drier</td></tr>
                        <tr><td>84%</td><td>${fmt(day.rain_p84)}&thinsp;mm</td><td>a wet day</td></tr>
                        <tr><td>97.5%</td><td>${fmt(day.rain_p97_5)}&thinsp;mm</td><td>very wet</td></tr>
                        <tr><td>Wettest on record</td><td>${fmt(day.rain_rec)}&thinsp;mm</td><td>${recDate(day.rain_rec_date)}</td></tr>
                        <tr><td class="highlight">Today&rsquo;s forecast</td><td class="highlight">${fmt(forecastRain)}&thinsp;mm</td><td class="highlight">${rainDesc}</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h2>Temperature records for this date</h2>
                <p class="hint">Most extreme values ever recorded within &plusmn;7 days of this date (1990&ndash;2024).</p>
                <table>
                    <thead><tr><th>Record</th><th>Temp</th><th>When</th></tr></thead>
                    <tbody>
                        <tr><td><span style="color:var(--forecast)">&#9650;</span> Highest max</td><td>${fmt(day.rec_high_max)}&deg;C</td><td>${recDate(day.rec_high_max_date)}</td></tr>
                        <tr><td><span style="color:var(--accent-light)">&#9660;</span> Lowest max</td><td>${fmt(day.rec_low_max)}&deg;C</td><td>${recDate(day.rec_low_max_date)}</td></tr>
                        <tr><td><span style="color:var(--forecast)">&#9650;</span> Highest min</td><td>${fmt(day.rec_high_min)}&deg;C</td><td>${recDate(day.rec_high_min_date)}</td></tr>
                        <tr><td><span style="color:var(--accent-light)">&#9660;</span> Lowest min</td><td>${fmt(day.rec_low_min)}&deg;C</td><td>${recDate(day.rec_low_min_date)}</td></tr>
                    </tbody>
                </table>
            </div>`;

        document.getElementById("meta").innerHTML =
            `Live conditions from <a href="https://open-meteo.com/">Open-Meteo</a> &middot; rainfall since 9am summed from hourly data. `
            + `Climatology: ${clim.meta.source}, ${clim.meta.period}, ${clim.meta.variable}. `
            + `&sigma; (temperature only) is the standard deviation of historical daily-max temperatures in a &plusmn;${clim.meta.window_days}-day window.`;
    } catch (err) {
        content.innerHTML = `<div class="error">Couldn&rsquo;t load the weather: ${err.message}</div>`;
    }
}

main();
</script>
</body>
</html>
