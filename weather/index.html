<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melbourne Weather in Context</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
        --accent: #1a5276;
        --accent-light: #2e86c1;
        --text: #222;
        --muted: #666;
        --border: #e2e2de;
        --bg: #f8f8f6;
        --card: #fff;
        --band-outer: #d6e6f2;
        --band-inner: #9cc3e0;
        --median: #1a5276;
        --forecast: #e8743b;
        --current: #2e8b57;
    }

    body {
        font-family: 'Inter', sans-serif;
        font-size: 15.5px;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
        margin: 0;
        padding: 40px 20px 60px;
    }

    .wrap { max-width: 720px; margin: 0 auto; }

    h1 {
        font-family: 'Source Serif 4', serif;
        font-weight: 600;
        font-size: 1.8rem;
        color: var(--accent);
        margin: 0 0 4px;
    }

    .subtitle { color: var(--muted); font-size: 0.95rem; margin: 0 0 28px; }

    /* ── Current conditions ── */
    .now {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-bottom: 28px;
    }

    .stat {
        flex: 1 1 120px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px 16px;
    }

    .stat .label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin-bottom: 4px;
    }

    .stat .value {
        font-family: 'Source Serif 4', serif;
        font-size: 1.7rem;
        font-weight: 600;
        color: var(--accent);
    }

    .stat .value small { font-size: 0.9rem; font-weight: 400; color: var(--muted); }

    /* ── Headline verdict ── */
    .verdict {
        background: var(--card);
        border: 1px solid var(--border);
        border-left: 4px solid var(--forecast);
        border-radius: 6px;
        padding: 16px 18px;
        margin-bottom: 28px;
        font-size: 1.02rem;
    }

    .verdict strong { color: var(--forecast); }

    /* ── Chart ── */
    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 20px;
        margin-bottom: 24px;
    }

    .card h2 {
        font-family: 'Source Serif 4', serif;
        font-size: 1.1rem;
        color: var(--accent);
        margin: 0 0 4px;
    }

    .card .hint { color: var(--muted); font-size: 0.85rem; margin: 0 0 12px; }

    svg { width: 100%; height: auto; display: block; }

    .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 10px;
        font-size: 0.82rem;
        color: var(--muted);
    }

    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
    .swatch.line { width: 14px; height: 0; border-top: 3px solid; border-radius: 0; }

    /* ── Percentile table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border); }
    th:first-child, td:first-child { text-align: left; }
    thead th { color: var(--muted); font-weight: 500; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    tbody tr:last-child td { border-bottom: none; }
    td.highlight { color: var(--forecast); font-weight: 600; }

    .meta { font-size: 0.78rem; color: #999; margin-top: 20px; line-height: 1.5; }
    .meta a { color: var(--accent-light); }

    .error { color: #b03030; background: #fdecec; border: 1px solid #f5c6c6; padding: 14px; border-radius: 6px; }
    .loading { color: var(--muted); }

    @media (max-width: 480px) {
        .stat .value { font-size: 1.4rem; }
        h1 { font-size: 1.5rem; }
    }
</style>
</head>
<body>
<div class="wrap">
    <h1>Melbourne weather, in context</h1>
    <p class="subtitle">Today&rsquo;s forecast against 35 years of history for this date.</p>

    <div id="content">
        <p class="loading">Loading current conditions and climatology&hellip;</p>
    </div>

    <p class="meta" id="meta"></p>
</div>

<script>
const LAT = -37.8136, LON = 144.9631;
const fmt = (x, d = 1) => (x === null || x === undefined || isNaN(x)) ? "–" : x.toFixed(d);

// Linear interpolation of the forecast's percentile rank from the 5 stored points.
function rankFromPercentiles(t, day) {
    const pts = [
        [day.p2_5, 2.5], [day.p16, 16], [day.p50, 50],
        [day.p84, 84], [day.p97_5, 97.5]
    ];
    if (t <= pts[0][0]) {
        return Math.max(0, 2.5 - (pts[0][0] - t) * (2.5 / Math.max(0.5, day.std)));
    }
    if (t >= pts[pts.length - 1][0]) {
        return Math.min(100, 97.5 + (t - pts[pts.length - 1][0]) * (2.5 / Math.max(0.5, day.std)));
    }
    for (let i = 0; i < pts.length - 1; i++) {
        const [t0, p0] = pts[i], [t1, p1] = pts[i + 1];
        if (t >= t0 && t <= t1) {
            const f = (t1 === t0) ? 0 : (t - t0) / (t1 - t0);
            return p0 + f * (p1 - p0);
        }
    }
    return 50;
}

function buildChart(day, forecastMax, currentTemp) {
    // ── geometry ──
    const W = 800, H = 250;
    const ml = 30, mr = 30, plotW = W - ml - mr;
    const bandTop = 112, bandH = 58, bandBot = bandTop + bandH;
    const recBlue = "var(--accent-light)", recOrange = "var(--forecast)";

    // record values bracket the axis on both ends (ignore any missing fields)
    const recs = [day.rec_high_max, day.rec_low_max, day.rec_high_min, day.rec_low_min].filter(Number.isFinite);
    const lo = Math.min(day.p2_5, currentTemp, forecastMax, ...recs);
    const hi = Math.max(day.p97_5, currentTemp, forecastMax, ...recs);
    const pad = Math.max(1.0, (hi - lo) * 0.06);
    const tMin = Math.floor(lo - pad);
    const tMax = Math.ceil(hi + pad);
    const x = t => ml + (t - tMin) / (tMax - tMin) * plotW;

    // ── axis ticks ──
    const span = tMax - tMin;
    const step = span <= 12 ? 2 : (span <= 25 ? 5 : 10);
    let ticks = "";
    for (let t = Math.ceil(tMin / step) * step; t <= tMax; t += step) {
        const xx = x(t).toFixed(1);
        ticks += `<line x1="${xx}" y1="${bandBot + 6}" x2="${xx}" y2="${bandBot + 11}" stroke="#bbb"/>`;
        ticks += `<text x="${xx}" y="${bandBot + 26}" text-anchor="middle" font-size="12" fill="#888">${t}&deg;</text>`;
    }

    // ── bands ──
    const xOuter0 = x(day.p2_5), xOuter1 = x(day.p97_5);
    const xInner0 = x(day.p16), xInner1 = x(day.p84);
    const xMed = x(day.p50);

    // ── record line helper (dashed, value label at top) ──
    function recLine(t, color) {
        const xx = x(t);
        const anchor = xx < ml + 18 ? "start" : (xx > W - mr - 18 ? "end" : "middle");
        return `
            <line x1="${xx}" y1="30" x2="${xx}" y2="${bandBot + 6}" stroke="${color}" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.85"/>
            <text x="${xx}" y="22" text-anchor="${anchor}" font-size="10" fill="${color}">${fmt(t)}&deg;</text>`;
    }

    // ── marker helper (solid, triangle + labels) ──
    function marker(t, color, label, sub, up) {
        const xx = x(t);
        const yTop = up ? bandTop - 30 : bandBot + 40;
        const yLine0 = up ? bandTop - 8 : bandBot + 8;
        const yLine1 = up ? bandBot : bandTop;
        const tri = up
            ? `${xx},${bandTop - 6} ${xx - 5},${bandTop - 13} ${xx + 5},${bandTop - 13}`
            : `${xx},${bandBot + 6} ${xx - 5},${bandBot + 13} ${xx + 5},${bandBot + 13}`;
        const anchor = xx < ml + 40 ? "start" : (xx > W - mr - 40 ? "end" : "middle");
        return `
            <line x1="${xx}" y1="${yLine0}" x2="${xx}" y2="${yLine1}" stroke="${color}" stroke-width="2.5"/>
            <polygon points="${tri}" fill="${color}"/>
            <text x="${xx}" y="${yTop}" text-anchor="${anchor}" font-size="13" font-weight="600" fill="${color}">${label}</text>
            <text x="${xx}" y="${yTop + 15}" text-anchor="${anchor}" font-size="11" fill="${color}" opacity="0.85">${sub}</text>`;
    }

    return `
    <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Forecast max temperature versus historical distribution and records">
        <rect x="${xOuter0}" y="${bandTop}" width="${xOuter1 - xOuter0}" height="${bandH}" fill="var(--band-outer)" rx="3"/>
        <rect x="${xInner0}" y="${bandTop}" width="${xInner1 - xInner0}" height="${bandH}" fill="var(--band-inner)" rx="3"/>
        ${Number.isFinite(day.rec_high_max) ? recLine(day.rec_high_max, recOrange) : ""}
        ${Number.isFinite(day.rec_high_min) ? recLine(day.rec_high_min, recOrange) : ""}
        ${Number.isFinite(day.rec_low_max) ? recLine(day.rec_low_max, recBlue) : ""}
        ${Number.isFinite(day.rec_low_min) ? recLine(day.rec_low_min, recBlue) : ""}
        <line x1="${xMed}" y1="${bandTop - 4}" x2="${xMed}" y2="${bandBot + 4}" stroke="var(--median)" stroke-width="2.5"/>
        <text x="${xMed}" y="${bandTop - 9}" text-anchor="middle" font-size="11" fill="var(--median)">median ${fmt(day.p50)}&deg;</text>
        <line x1="${ml}" y1="${bandBot + 6}" x2="${W - mr}" y2="${bandBot + 6}" stroke="#ddd"/>
        ${ticks}
        ${marker(forecastMax, "var(--forecast)", "Forecast max " + fmt(forecastMax) + "&deg;", "today", true)}
        ${marker(currentTemp, "var(--current)", "Now " + fmt(currentTemp) + "&deg;", "current", false)}
    </svg>
    <div class="legend">
        <span><i class="swatch" style="background:var(--band-outer)"></i> 95% range (2.5&ndash;97.5%)</span>
        <span><i class="swatch" style="background:var(--band-inner)"></i> 68% range (16&ndash;84%, &plusmn;1&sigma;)</span>
        <span><i class="swatch line" style="border-color:var(--median)"></i> median</span>
        <span><i class="swatch line" style="border-color:var(--forecast)"></i> forecast max</span>
        <span><i class="swatch line" style="border-color:var(--current)"></i> current</span>
        <span><i class="swatch line" style="border-color:var(--forecast);border-top-style:dashed"></i> record highs (highest max &amp; min)</span>
        <span><i class="swatch line" style="border-color:var(--accent-light);border-top-style:dashed"></i> record lows (lowest max &amp; min)</span>
    </div>`;
}

function verdictText(sigma) {
    const a = Math.abs(sigma);
    if (a < 0.5) return "right around the seasonal normal";
    if (a < 1) return (sigma > 0 ? "a little warmer" : "a little cooler") + " than usual";
    if (a < 2) return (sigma > 0 ? "notably warmer" : "notably cooler") + " than usual";
    if (a < 3) return (sigma > 0 ? "much warmer" : "much colder") + " than usual";
    return (sigma > 0 ? "extraordinarily warm" : "extraordinarily cold") + " for the date";
}

async function main() {
    const content = document.getElementById("content");
    try {
        const [fxRes, climRes] = await Promise.all([
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m&daily=temperature_2m_max,temperature_2m_min&timezone=Australia%2FMelbourne&forecast_days=1`),
            fetch("climatology.json?v=2", { cache: "no-cache" })
        ]);
        if (!fxRes.ok) throw new Error("Weather API returned " + fxRes.status);
        if (!climRes.ok) throw new Error("Could not load climatology.json");
        const fx = await fxRes.json();
        const clim = await climRes.json();

        const dateStr = fx.daily.time[0];                 // YYYY-MM-DD (Melbourne local)
        const d = new Date(dateStr + "T00:00:00");
        const month = d.getMonth() + 1, dayNum = d.getDate();
        const day = clim.days.find(x => x.month === month && x.day === dayNum)
                 || clim.days.find(x => x.month === month && x.day === 28); // Feb-29 fallback

        const currentTemp = fx.current.temperature_2m;
        const forecastMax = fx.daily.temperature_2m_max[0];
        const forecastMin = fx.daily.temperature_2m_min[0];

        const sigma = (forecastMax - day.mean) / day.std;
        const rank = Math.round(rankFromPercentiles(forecastMax, day));
        const desc = verdictText(sigma);

        const niceDate = d.toLocaleDateString("en-AU", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
        const recDate = iso => {
            const rd = new Date((iso || "") + "T00:00:00");
            return isNaN(rd) ? "&mdash;" : rd.toLocaleDateString("en-AU", { day: "numeric", month: "short", year: "numeric" });
        };

        content.innerHTML = `
            <div class="now">
                <div class="stat"><div class="label">Right now</div><div class="value">${fmt(currentTemp)}<small>&deg;C</small></div></div>
                <div class="stat"><div class="label">Forecast high</div><div class="value">${fmt(forecastMax)}<small>&deg;C</small></div></div>
                <div class="stat"><div class="label">Forecast low</div><div class="value">${fmt(forecastMin)}<small>&deg;C</small></div></div>
            </div>

            <div class="verdict">
                Today&rsquo;s forecast high of <strong>${fmt(forecastMax)}&deg;C</strong> is
                <strong>${desc}</strong> &mdash; that&rsquo;s
                <strong>${sigma >= 0 ? "+" : ""}${sigma.toFixed(1)}&sigma;</strong>
                from the mean, warmer than about <strong>${rank}%</strong> of days on this date historically.
            </div>

            <div class="card">
                <h2>Forecast high vs. the historical distribution</h2>
                <p class="hint">${niceDate} &middot; based on ${day.n} historical observations within &plusmn;7 days of this date.</p>
                ${buildChart(day, forecastMax, currentTemp)}
            </div>

            <div class="card">
                <h2>Historical max-temperature percentiles for this date</h2>
                <table>
                    <thead><tr><th>Percentile</th><th>Max temp</th><th>Meaning</th></tr></thead>
                    <tbody>
                        <tr><td>2.5%</td><td>${fmt(day.p2_5)}&deg;C</td><td>&minus;2&sigma; (very cool)</td></tr>
                        <tr><td>16%</td><td>${fmt(day.p16)}&deg;C</td><td>&minus;1&sigma;</td></tr>
                        <tr><td>50% (median)</td><td>${fmt(day.p50)}&deg;C</td><td>typical</td></tr>
                        <tr><td>84%</td><td>${fmt(day.p84)}&deg;C</td><td>+1&sigma;</td></tr>
                        <tr><td>97.5%</td><td>${fmt(day.p97_5)}&deg;C</td><td>+2&sigma; (very warm)</td></tr>
                        <tr><td class="highlight">Today&rsquo;s forecast</td><td class="highlight">${fmt(forecastMax)}&deg;C</td><td class="highlight">${sigma >= 0 ? "+" : ""}${sigma.toFixed(2)}&sigma; from mean (${fmt(day.mean)}&deg;C)</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h2>Records for this date</h2>
                <p class="hint">Most extreme values ever recorded within &plusmn;7 days of this date (1990&ndash;2024).</p>
                <table>
                    <thead><tr><th>Record</th><th>Temp</th><th>When</th></tr></thead>
                    <tbody>
                        <tr><td><span style="color:var(--forecast)">&#9650;</span> Highest max</td><td>${fmt(day.rec_high_max)}&deg;C</td><td>${recDate(day.rec_high_max_date)}</td></tr>
                        <tr><td><span style="color:var(--accent-light)">&#9660;</span> Lowest max</td><td>${fmt(day.rec_low_max)}&deg;C</td><td>${recDate(day.rec_low_max_date)}</td></tr>
                        <tr><td><span style="color:var(--forecast)">&#9650;</span> Highest min</td><td>${fmt(day.rec_high_min)}&deg;C</td><td>${recDate(day.rec_high_min_date)}</td></tr>
                        <tr><td><span style="color:var(--accent-light)">&#9660;</span> Lowest min</td><td>${fmt(day.rec_low_min)}&deg;C</td><td>${recDate(day.rec_low_min_date)}</td></tr>
                    </tbody>
                </table>
            </div>`;

        document.getElementById("meta").innerHTML =
            `Live conditions from <a href="https://open-meteo.com/">Open-Meteo</a>. `
            + `Climatology: ${clim.meta.source}, ${clim.meta.period}, ${clim.meta.variable}. `
            + `&sigma; is the standard deviation of historical daily-max temperatures in a &plusmn;${clim.meta.window_days}-day window.`;
    } catch (err) {
        content.innerHTML = `<div class="error">Couldn&rsquo;t load the weather: ${err.message}</div>`;
    }
}

main();
</script>
</body>
</html>
